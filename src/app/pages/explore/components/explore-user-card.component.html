<article class="explore-user-card" (click)="onCardClick()">
  @if (user().profileImageUrl) {
    <img [src]="user().profileImageUrl" alt="Avatar" class="explore-user-card__avatar-img" />
  } @else {
    <div class="explore-user-card__avatar" [style.background]="avatarColor" aria-hidden="true">
      {{ initials }}
    </div>
  }
  <div class="explore-user-card__info">
    <span class="explore-user-card__name">{{ user().displayName || user().username }}</span>
    <span class="explore-user-card__handle">&#64;{{ user().username }}</span>
    @if (user().bio) {
      <span class="explore-user-card__bio">{{ user().bio }}</span>
    }
  </div>
  <button 
    type="button" 
    class="explore-user-card__follow-btn" 
    [class.following]="user().isFollowedByMe" 
    (click)="onFollow($event)"
  >
    {{ user().isFollowedByMe ? 'Following' : 'Follow' }}
  </button>
</article>
