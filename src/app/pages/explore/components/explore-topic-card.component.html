<article class="explore-topic-card">
  <span class="explore-topic-card__emoji" aria-hidden="true">{{ topic().emoji }}</span>
  <div class="explore-topic-card__info">
    <span class="explore-topic-card__title">{{ topic().title }}</span>
    <span class="explore-topic-card__tag">{{ topic().tag }}</span>
    <span class="explore-topic-card__count">{{ topic().count }}</span>
  </div>
</article>
