<div class="explore-feed">
  @for (topic of topics(); track topic.tag) {
    <app-explore-topic-card [topic]="topic" class="explore-feed__card" />
  } @empty {
    <div class="empty-state">
      <div class="empty-icon">😂</div>
      <h2>No meme topics yet</h2>
      <p>Meme hashtags will appear here.</p>
    </div>
  }
</div>
